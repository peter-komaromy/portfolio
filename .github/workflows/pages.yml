name: Deploy Sphinx site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Show checked-out commit
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          git log --oneline -1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Show installed documentation packages
        run: |
          python -m pip show sphinx
          python -m pip show pydata-sphinx-theme

      - name: Show active Sphinx theme setting
        run: |
          grep -n "html_theme" source/conf.py || true
          grep -n "html_theme_options" source/conf.py || true

      - name: Build Sphinx HTML
        run: |
          rm -rf build/html
          sphinx-build -b html -E -a source build/html

      - name: Inspect built HTML
        run: |
          grep -R "pydata\|alabaster" -n build/html | head -50 || true
          test -f build/html/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/html

      - name: Show Python package versions
        run: |
          python -m pip freeze | sort
          python -m pip show sphinx pydata-sphinx-theme sphinx-datatables sphinxcontrib-jquery
          python -m sphinx --version

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  